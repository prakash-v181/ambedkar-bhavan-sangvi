<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ambedkar Bhavan Sangvi Events Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #8398b7;
      font-family: Arial, sans-serif;
    }

    h2.title {
      text-align: center;
      padding: 30px 10px;
      color: #0e67d4;
    }

    .slider-container {
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      padding: 10px 0;
    }

    .slider-track {
      display: inline-block;
      animation: scroll 30s linear infinite;
    }

    .slider-track img {
      height: 220px;
      margin: 0 15px;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .slider-track img:hover {
      transform: scale(1.05);
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    footer {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Title -->
  <h2 class="title">Babashaheb Dr Ambedkar  - Original Photos</h2>

  <!-- Slider -->
  <div class="container-fluid">
    <div class="slider-container">
      <div class="slider-track d-flex align-items-center">
        <!-- Add as many images as needed -->
        <img src="babashaheb/ambedkar1.jpg" alt="Statue">
        <img src="babashaheb/ambedkar2.jpg" alt="Statue">
        <img src="babashaheb/ambedkar3.jpeg" alt="Statue">
        <img src="babashaheb/ambedkar4.jpg" alt="Memorial">
        <img src="babashaheb/ambedkar5.jpg" alt="Dr. Ambedkar">
        <img src="babashaheb/ambedkar6.png" alt="Portrait">
        <img src="babashaheb/ambedkar7.jpg" alt="June 1948">
        <!-- Repeat if needed for infinite loop effect -->
        <img src="babashaheb/ambedkar8.jpg" alt="Statue Copy">
        <img src="babashaheb/ambedkar10.jpg" alt="Memorial Copy">
        <img src="babashaheb/ambedkar9.jpg" alt="Memorial Copy">
        <img src="babashaheb/ambedkar12.jpg" alt="Memorial Copy">
      </div>
    </div>
  </div>

   <h2 class="title">📸 Ambedkar Bhavan Sangvi - Event Photos</h2>

   <!-- Slider -->
  <div class="container-fluid">
    <div class="slider-container">
      <div class="slider-track d-flex align-items-center">
        <!-- Add as many images as needed -->
        <img src="photos/prakash1.jpeg" alt="Statue">
        <img src="photos/prakashs1.jpeg" alt="Statue">
        <img src="photos/17.jpeg" alt="Statue">
        <img src="photos/9.jpeg" alt="Memorial">
        <img src="photos/7.jpg" alt="Dr. Ambedkar">
        <img src="photos/school1.jpeg" alt="Portrait">
        <img src="photos/prakash3.jpeg" alt="June 1948">
        <!-- Repeat if needed for infinite loop effect -->
        <img src="photos/milind.jpg" alt="Statue Copy">
        <img src="photos/" alt="Memorial Copy">
        <img src="photos/" alt="Memorial Copy">
        <img src="photos/" alt="Memorial Copy">
      </div>
    </div>
  </div>

  

  <!-- Footer -->
  <footer>
    <p>© 2025 Ambedkar Bhavan Sangvi. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
